<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="java.css">
    <script src="java.js" defer></script>
</head>
<body>
    <div id="container">
        <form id="contain">
            <label for="fname">Firstname:</label>
            <input type="text" name="fname" id="fname">

            <label for="lname">Lastname:</label>
            <input type="text" name="lname" id="lname">

            <label for="phone">Phone no:</label>
            <input type="number" name="phone" id="phone">

            <label for="mail">Email:</label>
            <input type="email" name="mail" id="mail">
            
            <label for="pin">Password:</label>
            <input type="password" name="pin" id="pin">

            <p class="warn1"><i class="fa-solid fa-circle-exclamation warn1"></i>should not be less than 8 characters</p>
            <p class="warn2"><i class="fa-solid fa-circle-exclamation warn2"></i>should contain capital letter</p>
            <p class="warn3"><i class="fa-solid fa-circle-exclamation warn3"></i>should contain a number</p>
            <p class="warn4"><i class="fa-solid fa-circle-exclamation warn4"></i>should contain a special character</p>

            <label for="pin2">Confirm Password:</label>
            <input type="password" name="pin2" id="pins">

            <p class="warning"><i class="fa-solid fa-circle-exclamation warning"></i>password doesnt match</p>

            <input type="submit" id="submitbtn" onclick="validate(event)">
        </form>
    </div>
</body>
</html>
